name: Protected file review

on:
  workflow_call:
    inputs:
      owner:
        description: GitHub login that owns protected-file review.
        required: false
        type: string
        default: itsjustatank
      allow-owner-authored:
        description: Allow the owner to author protected-file pull requests.
        required: false
        type: boolean
        default: true
      policy-file:
        description: Policy path in the trusted default branch.
        required: false
        type: string
        default: checker/policy.json

permissions:
  contents: read
  pull-requests: read

jobs:
  protected-file-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout trusted default branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false

      - name: Require current owner approval
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
          PROTECTED_FILES_OWNER: ${{ inputs.owner }}
          PROTECTED_FILES_POLICY: ${{ inputs.policy-file }}
          PROTECTED_FILES_ALLOW_OWNER_AUTHORED: ${{ inputs.allow-owner-authored }}
        run: python3 checker/check_protected_files.py
